<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TN 2026 · Candidate Detail</title>
<link rel="stylesheet" href="common.css">
<script src="data.js"></script><script src="common.js"></script>
</head><body>
<div class="app" id="app"></div>
<script>
const params = new URLSearchParams(location.search);
const key = decodeURIComponent(params.get('key') || '');

// Fail-safe: Fix names if common.js normalization hasn't run or missed this entry
function getNormalizedCandidate(searchKey) {
  let c = TN.candidates.find(item => item.key === searchKey);
  if (c && (typeof c.name !== 'string' || !isNaN(c.name) || c.name === "")) {
    c.name = String(c.key).split('||')[0].trim();
  }
  return c;
}

const cand = getNormalizedCandidate(key);
const fromConst = params.get('from');

function init() {
  if (!cand) {
    document.getElementById('app').innerHTML = buildSidebar('candidates') + `
      <div class="main">${buildTopbar('Candidate Not Found')}
        <div class="content">
          <p style="padding:24px;color:var(--t3)">Candidate not found. <a href="candidates.html">← Back to candidates</a></p>
        </div>
      </div>`;
    return;
  }

  const depAccs = TN.cand_accounts[key] || [];
  const loanAccs = TN.cand_loans[key] || [];
  const partyC = partyColor(cand.party);
  const backHref = fromConst ? `constituency.html?name=${encodeURIComponent(fromConst)}` : 'candidates.html';
  const backLabel = fromConst ? `← ${fromConst}` : '← All Candidates';

  // Group accounts by bank
  const bankMap = {};
  depAccs.forEach(a => {
    if (!bankMap[a.bank]) bankMap[a.bank] = { bank: a.bank, accs: [], loanAccs: [] };
    bankMap[a.bank].accs.push(a);
  });
  loanAccs.forEach(a => {
    if (!bankMap[a.bank]) bankMap[a.bank] = { bank: a.bank, accs: [], loanAccs: [] };
    bankMap[a.bank].loanAccs.push(a);
  });
  
  const bankEntries = Object.values(bankMap).sort((a, b) => {
    const ad = a.accs.reduce((s, x) => s + x.amount, 0);
    const bd = b.accs.reduce((s, x) => s + x.amount, 0);
    return bd - ad;
  });

  const relMap = {};
  depAccs.forEach(a => { const r = a.relation || 'Self'; relMap[r] = (relMap[r] || 0) + a.amount; });
  const relEntries = Object.entries(relMap).sort((a, b) => b[1] - a[1]);

  document.getElementById('app').innerHTML = buildSidebar('candidates') + `
  <div class="main">
    ${buildTopbar(escH(cand.name), 'Candidate Detail')}
    <div class="content">
      <a class="back-btn" href="${escH(backHref)}">${escH(backLabel)}</a>

      <div class="cand-hero">
        <div class="hero-avatar" style="background:${partyC}">${initials(cand.name)}</div>
        <div style="flex:1">
          <div class="hero-name" style="font-size:22px">${escH(cand.name)}</div>
          <div class="hero-meta">
            <span class="ppill" style="background:${partyC}22;color:${partyC}">${escH(cand.party)}</span>
            &nbsp;·&nbsp;<strong>${escH(cand.constituency)}</strong> constituency
          </div>
          
          <div style="margin-top:12px">
            ${cand.url && cand.url !== '0' ? `
              <a href="${cand.url}" target="_blank" class="tab active" style="text-decoration:none; display:inline-flex; align-items:center; gap:8px; background:var(--blue); color:white; padding:8px 16px; border-radius:8px; font-weight:600;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                Detailed View on MyNeta
              </a>
            ` : ''}
          </div>
        </div>
        <div style="text-align:right">
           <div style="font-size:10px; color:var(--t3); text-transform:uppercase; font-weight:700">Total Deposits</div>
           <div style="font-family:'DM Mono'; font-size:20px; font-weight:700; color:var(--blue)">${fmt(cand.deposits)}</div>
        </div>
      </div>

      ${relEntries.length > 1 ? `
      <div class="card mb">
        <div class="card-hd"><div class="card-title">Deposits by Relation</div></div>
        <div style="display:flex;flex-wrap:wrap;gap:10px">
          ${relEntries.map(([r, amt]) => `<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 14px;min-width:130px">
            <div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px">${escH(r)}</div>
            <div style="font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:var(--text)">${fmt(amt)}</div>
          </div>`).join('')}
        </div>
      </div>` : ''}

      <div class="g2">
        <div>
          <div class="sec-hd" style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:10px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><rect x="3" y="10" width="18" height="11" rx="1"/><path d="M3 10l9-7 9 7"/></svg>
            Bank Deposit Accounts
            <span class="badge badge-blue">${depAccs.length} accounts</span>
          </div>
          ${bankEntries.filter(b => b.accs.length).map(b => {
            const total = b.accs.reduce((s, a) => s + a.amount, 0);
            return `<div class="acc-card">
              <div class="acc-bank">${escH(b.bank)}</div>
              ${b.accs.map(a => `
                <div class="acc-meta" style="margin-top:5px;padding-top:5px;border-top:1px dashed var(--border)">
                  ${a.branch ? `<strong>${escH(a.branch)}</strong> · ` : ''}
                  <span class="ppill" style="background:var(--bg2);color:var(--t2)">${escH(a.relation)}</span>
                  ${a.type && a.type !== 'Unknown' ? ` · ${escH(a.type)}` : ''}
                  <div style="font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--green);margin-top:3px">${fmt(a.amount)}</div>
                </div>`).join('')}
              ${b.accs.length > 1 ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--blue)">Bank Total: ${fmt(total)}</div>` : ''}
            </div>`;
          }).join('') || '<p style="color:var(--t3);font-size:13px;padding:12px 0">No deposit accounts on record.</p>'}
        </div>
        <div>
          <div class="sec-hd" style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:10px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            Loan Accounts
            <span class="badge badge-red">${loanAccs.length} loans</span>
          </div>
          ${loanAccs.length === 0 ? `<div class="acc-card" style="background:var(--grl);border-color:var(--green)"><div class="acc-bank" style="color:var(--green)">✓ No loans declared</div><div class="acc-meta">This candidate has no outstanding loans on record.</div></div>` :
          bankEntries.filter(b => b.loanAccs.length).map(b => {
            const total = b.loanAccs.reduce((s, a) => s + a.amount, 0);
            return `<div class="acc-card" style="border-left:3px solid var(--red)">
              <div class="acc-bank">${escH(b.bank)}</div>
              ${b.loanAccs.map(a => `
                <div class="acc-meta" style="margin-top:5px;padding-top:5px;border-top:1px dashed var(--border)">
                  ${a.branch ? `<strong>${escH(a.branch)}</strong> · ` : ''}
                  <span class="ppill" style="background:var(--rl);color:var(--red)">${escH(a.relation)}</span>
                  <div style="font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--red);margin-top:3px">${fmt(a.amount)}</div>
                </div>`).join('')}
              ${b.loanAccs.length > 1 ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--red)">Total: ${fmt(total)}</div>` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

function escH(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
init();
</script>
<style>
.cand-hero{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;box-shadow:var(--shadow);margin-bottom:14px;display:flex;align-items:flex-start;gap:16px}
.hero-avatar{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:21px;font-weight:700;color:#fff;flex-shrink:0}
.hero-name{font-family:'Fraunces',serif;font-size:19px;font-weight:600;margin-bottom:6px}
.hero-meta{font-size:12px;color:var(--t2);line-height:1.6}
.acc-card{border:1px solid var(--border);border-radius:8px;padding:12px 15px;margin-bottom:9px}
.acc-bank{font-weight:700;font-size:13px;color:var(--text)}
.acc-meta{font-size:11.5px;color:var(--t3)}
.sec-hd{display:flex;align-items:center;gap:7px}
.mb{margin-bottom:14px}
</style>
</body></html>
