<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TN 2026 · Constituency Detail</title>
<link rel="stylesheet" href="common.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="data.js"></script><script src="common.js"></script>
</head><body>
<div class="app" id="app"></div>
<script>
const params=new URLSearchParams(location.search);
const constName=decodeURIComponent(params.get('name')||'');
const constData=TN.constituencies.find(c=>c.name===constName)||{name:constName,deposits:0,loans:0,net:0,candidates:0};
let cands=TN.candidates.filter(c=>c.constituency===constName).sort((a,b)=>b.deposits-a.deposits);

function init(){
  document.getElementById('app').innerHTML=buildSidebar('constituencies')+`
  <div class="main">
    ${buildTopbar(escH(constName),'Constituency Detail')}
    <div class="content">
      <a class="back-btn" href="constituencies.html">← All Constituencies</a>
      <!-- HERO STATS -->
      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">
        <div class="stat-card blue"><div class="s-label">Total Deposits</div><div class="s-value">${fmtShort(constData.deposits)}</div><div class="s-meta">All candidates combined</div></div>
        <div class="stat-card red"><div class="s-label">Total Loans</div><div class="s-value red">${fmtShort(constData.loans)}</div><div class="s-meta">All candidates combined</div></div>
        <div class="stat-card ${constData.net>=0?'green':'red'}"><div class="s-label">Net Position</div><div class="s-value ${constData.net>=0?'green':'red'}">${constData.net>=0?'+':'−'}${fmtShort(Math.abs(constData.net))}</div><div class="s-meta">${constData.net>=0?'Deposits exceed loans':'Loans exceed deposits'}</div></div>
        <div class="stat-card teal"><div class="s-label">Candidates</div><div class="s-value">${cands.length}</div><div class="s-meta">${[...new Set(cands.map(c=>c.party))].length} parties</div></div>
      </div>
      <!-- CHART + PARTY BREAKDOWN -->
      <div class="g2" style="margin-bottom:14px">
        <div class="card"><div class="card-hd"><div class="card-title">Candidates by Wealth</div><div class="card-sub">Deposits vs loans</div></div><canvas id="chart-cands" height="220"></canvas></div>
        <div class="card"><div class="card-hd"><div class="card-title">Party Breakdown</div><div class="card-sub">Candidates per party</div></div><canvas id="chart-party" height="220"></canvas></div>
      </div>
      <!-- FILTER + CANDIDATE LIST -->
      <div class="card">
        <div class="card-hd">
          <div><div class="card-title">All Candidates in ${escH(constName)}</div><div class="card-sub" id="cand-count">Showing ${cands.length} candidates</div></div>
          <div style="display:flex;gap:8px;align-items:center">
            <input class="search-lg" id="cand-search" placeholder="Search name or party…" oninput="renderCands()" style="width:200px;padding:6px 10px;font-size:12px">
            <select id="cand-sort" onchange="renderCands()">
              <option value="dep">Highest Deposits</option><option value="loan">Highest Loans</option>
              <option value="net_d">Best Net</option><option value="name">Name A–Z</option>
            </select>
          </div>
        </div>
        <div id="cand-list"></div>
      </div>
    </div>
  </div>`;
  renderCharts();renderCands();
}

function renderCharts(){
  const top=cands.slice(0,12);
  new Chart(document.getElementById('chart-cands'),{type:'bar',data:{
    labels:top.map(c=>c.name.split(' ').slice(0,2).join(' ')),
    datasets:[{label:'Deposits',data:top.map(c=>c.deposits),backgroundColor:'#1D4ED8AA',borderRadius:4},{label:'Loans',data:top.map(c=>c.loans),backgroundColor:'#B91C1CAA',borderRadius:4}]
  },options:{responsive:true,scales:{y:{ticks:{callback:v=>fmtShort(v),font:{family:'DM Mono',size:9}},grid:{color:'#E2DDD5'}},x:{grid:{display:false},ticks:{font:{size:9}}}},plugins:{legend:{position:'top',labels:{font:{family:'DM Sans',size:10},boxWidth:9}}}}});
  const partyMap={};
  cands.forEach(c=>{partyMap[c.party]=(partyMap[c.party]||0)+1;});
  const parties=Object.entries(partyMap).sort((a,b)=>b[1]-a[1]);
  new Chart(document.getElementById('chart-party'),{type:'doughnut',data:{labels:parties.map(p=>p[0]),datasets:[{data:parties.map(p=>p[1]),backgroundColor:parties.map(p=>partyColor(p[0])),borderWidth:2,borderColor:'#fff',hoverOffset:4}]},options:{cutout:'55%',plugins:{legend:{position:'right',labels:{font:{family:'DM Sans',size:9},boxWidth:9}}}}});
}

function renderCands(){
  const q=(document.getElementById('cand-search').value||'').toLowerCase();
  const sort=document.getElementById('cand-sort').value;
  let list=[...cands];
  if(q) list=list.filter(c=>c.name.toLowerCase().includes(q)||c.party.toLowerCase().includes(q));
  if(sort==='dep') list.sort((a,b)=>b.deposits-a.deposits);
  else if(sort==='loan') list.sort((a,b)=>b.loans-a.loans);
  else if(sort==='net_d') list.sort((a,b)=>b.net-a.net);
  else list.sort((a,b)=>a.name.localeCompare(b.name));
  document.getElementById('cand-count').textContent=`Showing ${list.length} candidates`;
  document.getElementById('cand-list').innerHTML=list.map(c=>`
    <a class="cand-row" href="candidate.html?key=${encodeURIComponent(c.key)}">
      <div class="cand-avatar" style="background:${avatarColor(c.name)}">${initials(c.name)}</div>
      <div class="cand-info">
        <div class="cand-name">${escH(c.name)}</div>
        <div class="cand-meta"><span class="ppill" style="background:${partyColor(c.party)}22;color:${partyColor(c.party)}">${escH(c.party)}</span></div>
      </div>
      <div class="cand-amt">
        <div class="cand-dep">${fmtShort(c.deposits)}</div>
        ${c.loans>0?`<div class="cand-loan">Loans: ${fmtShort(c.loans)}</div>`:''}
      </div>
      <div style="margin-left:10px;color:var(--t3);font-size:18px">›</div>
    </a>`).join('');
}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escJ(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
init();
</script></body></html>
