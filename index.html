<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TN 2026 · Election Finance Dashboard</title>
<link rel="stylesheet" href="common.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="data.js"></script><script src="common.js"></script>
</head><body>
<div class="app" id="app"></div>
<div class="overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-hd"><div><div class="modal-title" id="modal-title">Bank</div><div class="modal-sub" id="modal-sub"></div></div><button class="modal-x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="filter-bar" style="margin-bottom:11px">
        <span class="filter-label">Sort:</span>
        <select id="modal-sort" onchange="renderModalCands()">
          <option value="dep">Highest Deposits</option><option value="loan">Highest Loans</option><option value="name">Name A–Z</option>
        </select>
      </div>
      <div id="modal-cands"></div>
    </div>
  </div>
</div>
<script>
let currentBank=null;

function init(){
  const m=TN.meta;
  document.getElementById('app').innerHTML=buildSidebar('index')+`
  <div class="main">
    ${buildTopbar('Overview')}
    <div class="content">
      <div class="stats-grid">
        <div class="stat-card blue"><div class="s-label">Total Deposits</div><div class="s-value">${fmt(m.total_deposits)}</div><div class="s-meta">12,991 accounts · 234 constituencies</div></div>
        <div class="stat-card red"><div class="s-label">Total Loans</div><div class="s-value red">${fmt(m.total_loans)}</div><div class="s-meta">5,589 loan accounts</div></div>
        <div class="stat-card teal"><div class="s-label">Candidates Analysed</div><div class="s-value">${m.total_candidates.toLocaleString()}</div><div class="s-meta">${m.total_parties} parties · 234 constituencies</div></div>
        <div class="stat-card gold"><div class="s-label">Net Position</div><div class="s-value red">−${fmt(m.total_loans-m.total_deposits)}</div><div class="s-meta">Loans exceed deposits</div></div>
      </div>
      <div class="alert"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Across all ${m.total_candidates.toLocaleString()} candidates, total declared loans (<strong>${fmt(m.total_loans)}</strong>) exceed deposits (<strong>${fmt(m.total_deposits)}</strong>) — a net borrowing position of <strong>${fmt(m.total_loans-m.total_deposits)}</strong>.
      </div>
      <div class="g60">
        <div class="card"><div class="card-hd"><div><div class="card-title">Top 15 Banks by Deposits</div><div class="card-sub">Click any bank to see candidate accounts</div></div><span class="badge badge-blue">Deposits</span></div><div class="bar-list" id="dep-bars"></div></div>
        <div class="card"><div class="card-hd"><div><div class="card-title">Deposits by Relation</div><div class="card-sub">Self vs family members</div></div></div><canvas id="chart-rel" height="200"></canvas><div class="legend" id="rel-legend"></div></div>
      </div>
      <div class="g60">
        <div class="card"><div class="card-hd"><div><div class="card-title">Top 15 Banks by Loans</div><div class="card-sub">Outstanding loan amounts — click to explore</div></div><span class="badge badge-red">Loans</span></div><div class="bar-list" id="loan-bars"></div></div>
        <div class="card"><div class="card-hd"><div><div class="card-title">Top 10 Parties by Deposits</div><div class="card-sub">Aggregate candidate wealth</div></div></div><canvas id="chart-party" height="200"></canvas></div>
      </div>
      <div class="g2">
        <div class="card"><div class="card-hd"><div class="card-title">Top Candidates by Wealth</div><div class="card-sub">Highest declared deposits</div></div><div id="top-cands-dep"></div></div>
        <div class="card"><div class="card-hd"><div class="card-title">Top Constituencies by Deposits</div><div class="card-sub">Aggregate per constituency</div></div><div id="top-consts"></div></div>
      </div>
    </div>
  </div>`;
  renderBars();renderRelationChart();renderPartyChart();renderTopCands();renderTopConsts();
}

function renderBars(){
  const banks=TN.banks.slice(0,15);
  const maxD=banks[0].deposits;
  const byLoan=[...TN.banks].sort((a,b)=>b.loans-a.loans).slice(0,15);
  const maxL=byLoan[0].loans;
  document.getElementById('dep-bars').innerHTML=banks.map(b=>`
    <div class="bar-item" onclick="openModal('${escJ(b.name)}','dep')">
      <div class="bar-name" title="${escH(b.name)}">${escH(b.name)}</div>
      <div class="bar-track"><div class="bar-fill blue" style="width:${(b.deposits/maxD*100).toFixed(1)}%"></div></div>
      <div class="bar-amt">${fmtShort(b.deposits)}</div>
    </div>`).join('');
  document.getElementById('loan-bars').innerHTML=byLoan.map(b=>`
    <div class="bar-item" onclick="openModal('${escJ(b.name)}','loan')">
      <div class="bar-name" title="${escH(b.name)}">${escH(b.name)}</div>
      <div class="bar-track"><div class="bar-fill red" style="width:${(b.loans/maxL*100).toFixed(1)}%"></div></div>
      <div class="bar-amt">${fmtShort(b.loans)}</div>
    </div>`).join('');
}

function renderRelationChart(){
  const cols=['#1D4ED8','#0D9488','#C9962A','#B91C1C','#7C3AED','#059669'];
  const lbls=['Self','Spouse','Dependent 1','Dependent 2','HUF','Dependent 3'];
  const vals=[81,16,2,1,0.5,0.5];
  new Chart(document.getElementById('chart-rel'),{type:'doughnut',data:{labels:lbls,datasets:[{data:vals,backgroundColor:cols,borderWidth:2,borderColor:'#fff',hoverOffset:4}]},options:{cutout:'68%',plugins:{legend:{display:false}},animation:{duration:500}}});
  document.getElementById('rel-legend').innerHTML=lbls.map((l,i)=>`<div class="legend-item"><div class="ldot" style="background:${cols[i]}"></div>${l} ${vals[i]}%</div>`).join('');
}

function renderPartyChart(){
  const top=TN.parties.slice(0,10);
  new Chart(document.getElementById('chart-party'),{type:'bar',data:{labels:top.map(p=>p.name.length>18?p.name.slice(0,16)+'…':p.name),datasets:[{label:'Deposits',data:top.map(p=>p.deposits),backgroundColor:top.map(p=>partyColor(p.name)+'BB'),borderRadius:4},{label:'Loans',data:top.map(p=>p.loans),backgroundColor:top.map(p=>partyColor(p.name)+'44'),borderRadius:4}]},options:{responsive:true,scales:{y:{ticks:{callback:v=>fmtShort(v),font:{family:'DM Mono',size:9}},grid:{color:'#E2DDD5'}},x:{grid:{display:false},ticks:{font:{size:9}}}},plugins:{legend:{position:'top',labels:{font:{family:'DM Sans',size:10},boxWidth:9}}}}});
}

function renderTopCands(){
  const top=TN.candidates.slice(0,10);
  document.getElementById('top-cands-dep').innerHTML=top.map((c,i)=>`
    <a class="cand-row" href="candidate.html?key=${encodeURIComponent(c.key)}">
      <div class="cand-avatar" style="background:${avatarColor(c.name)}">${initials(c.name)}</div>
      <div class="cand-info"><div class="cand-name">${escH(c.name)}</div><div class="cand-meta"><span class="ppill" style="background:${partyColor(c.party)}22;color:${partyColor(c.party)}">${escH(c.party)}</span> · ${escH(c.constituency)}</div></div>
      <div class="cand-amt"><div class="cand-dep">${fmtShort(c.deposits)}</div>${c.loans>0?`<div class="cand-loan">−${fmtShort(c.loans)}</div>`:''}</div>
    </a>`).join('');
}

function renderTopCands(){
  // Grab the top 10 from the globally fixed TN.candidates array
  const top = TN.candidates.slice(0, 10);
  document.getElementById('top-cands-dep').innerHTML = top.map((c, i) => `
    <a class="cand-row" href="candidate.html?key=${encodeURIComponent(c.key)}">
      <div class="cand-avatar" style="background:${avatarColor(c.name)}">${initials(c.name)}</div>
      <div class="cand-info">
        <div class="cand-name">${escH(c.name)}</div>
        <div class="cand-meta">
          <span class="ppill" style="background:${partyColor(c.party)}22;color:${partyColor(c.party)}">${escH(c.party)}</span> · ${escH(c.constituency)}
        </div>
      </div>
      <div class="cand-amt">
        <div class="cand-dep">${fmtShort(c.deposits)}</div>
        ${c.loans > 0 ? `<div class="cand-loan" style="color:var(--red)">−${fmtShort(c.loans)}</div>` : ''}
      </div>
    </a>`).join('');
}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escJ(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function openModal(bankName,type){
  currentBank=bankName;
  const bank=TN.banks.find(b=>b.name===bankName)||{name:bankName,deposits:0,loans:0,accounts:0};
  document.getElementById('modal-title').textContent=bankName;
  document.getElementById('modal-overlay').classList.add('open');
  renderModalCands();
}
function renderModalCands(){
  const sort = document.getElementById('modal-sort').value;
  let cands = [];
  const bn = currentBank;

  TN.candidates.forEach(c => {
    // Ensure we check BOTH deposits and loans for this bank
    const accs = (TN.cand_accounts[c.key] || []).filter(a => a.bank === bn);
    const laccs = (TN.cand_loans[c.key] || []).filter(a => a.bank === bn);
    
    if (accs.length || laccs.length) {
      const depAmt = accs.reduce((s, a) => s + a.amount, 0);
      const loanAmt = laccs.reduce((s, a) => s + a.amount, 0);
      // We push the full candidate object + the bank-specific totals
      cands.push({ ...c, bankDep: depAmt, bankLoan: loanAmt, accs, laccs });
    }
  });

  // Sorting
  if (sort === 'dep') cands.sort((a, b) => b.bankDep - a.bankDep);
  else if (sort === 'loan') cands.sort((a, b) => b.bankLoan - a.bankLoan);
  else cands.sort((a, b) => a.name.localeCompare(b.name));

  document.getElementById('modal-cands').innerHTML = cands.map(c => `
    <a class="cand-row" href="candidate.html?key=${encodeURIComponent(c.key)}">
      <div class="cand-avatar" style="background:${avatarColor(c.name)}">${initials(c.name)}</div>
      <div class="cand-info">
        <div class="cand-name">${escH(c.name)}</div>
        <div class="cand-meta">${escH(c.party)} · ${escH(c.constituency)}</div>
      </div>
      <div class="cand-amt">
        <div class="cand-dep">${fmtShort(c.bankDep)}</div>
        ${c.bankLoan > 0 ? `<div class="cand-loan" style="color:var(--red)">L: ${fmtShort(c.bankLoan)}</div>` : ''}
      </div>
    </a>`).join('');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');currentBank=null;}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});
init();
</script></body></html>
